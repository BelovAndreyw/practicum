<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Командный зачёт — Frontend Stub</title>
</head>
<body>
    <h1>Командный зачёт</h1>
    <p>Frontend stub — заменить при выборе стека</p>
    <p>Status: <span id="status">loading...</span></p>
    <script>
        fetch('/api/health')
            .then(r => r.json())
            .then(d => document.getElementById('status').textContent = d.status)
            .catch(() => document.getElementById('status').textContent = 'backend unavailable');
    </script>
</body>
</html>
