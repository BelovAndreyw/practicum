name: Infra Deploy

on:
  push:
    branches: [DevOps]
    paths:
      - 'infra/**'
      - '.github/workflows/infra-deploy.yml'

jobs:
  validate:
    name: Validate infrastructure configs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env for validation
        run: |
          cat > .env <<'EOF'
          POSTGRES_USER=teamzachet
          POSTGRES_PASSWORD=validation_password
          POSTGRES_DB=teamzachet
          DATABASE_URL=postgresql+asyncpg://teamzachet:validation_password@postgres:5432/teamzachet

          # JWT
          SECRET_KEY=validation_secret_key
          ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=30
          DEMO_MODE=false

          # App ports (docker-compose)
          BACKEND_HOST=0.0.0.0
          BACKEND_PORT=8000
          EOF
          cp .env .env.test

      - name: Validate dev compose
        run: docker compose -f infra/docker-compose.dev.yml --env-file .env config --quiet

      - name: Validate test compose
        run: docker compose -f infra/docker-compose.test.yml --env-file .env.test config --quiet

      - name: Check nginx configs syntax
        run: |
          docker run --rm \
            --add-host backend:127.0.0.1 \
            --add-host frontend:127.0.0.1 \
            -v ${{ github.workspace }}/infra/nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro \
            nginx:1.25-alpine nginx -t

