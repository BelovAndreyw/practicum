# CI/CD — основной пайплайн
# Триггер: push/PR в master
# Сборка Docker-образов + деплой на test (TODO: активировать при получении сервера)

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  COMPOSE_FILE: infra/docker-compose.test.yml

jobs:
  build:
    name: Build Docker images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create test .env file
        run: |
          cat > .env.test <<'EOF'
          POSTGRES_USER=teamzachet
          POSTGRES_PASSWORD=ci_test_password
          POSTGRES_DB=teamzachet
          DATABASE_URL=postgresql+asyncpg://teamzachet:ci_test_password@postgres:5432/teamzachet

          # JWT
          SECRET_KEY=ci_test_secret_key_1234567890abcdef
          ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=30
          DEMO_MODE=false

          # App ports (docker-compose)
          BACKEND_HOST=0.0.0.0
          BACKEND_PORT=8000
          EOF

      - name: Build all Docker images
        run: |
          docker compose -f infra/docker-compose.test.yml --env-file .env.test build

      - name: Start services and verify health
        run: |
          # Генерируем TLS сертификаты для nginx тестового стенда
          bash infra/ssl/generate-self-signed.sh
          docker compose -f infra/docker-compose.test.yml --env-file .env.test up -d
          echo "Waiting for backend to become healthy..."
          for i in {1..60}; do
            status="$(docker inspect -f '{{.State.Health.Status}}' tz-test-backend 2>/dev/null || true)"
            if [ "$status" = "healthy" ]; then
              echo "Backend is healthy."
              break
            fi
            if [ "$status" = "unhealthy" ]; then
              echo "Backend is unhealthy."
              break
            fi
            sleep 2
          done
          docker compose -f infra/docker-compose.test.yml --env-file .env.test ps

          # Проверяем health backend через внутреннюю сеть (и даём понятные логи при падении)
          if ! docker exec tz-test-backend python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/', timeout=2).read()"; then
            echo "Health check failed. Printing logs..."
            docker compose -f infra/docker-compose.test.yml --env-file .env.test logs --no-color --tail=200 backend postgres nginx || true
            exit 1
          fi
          echo "Health check passed!"

      - name: Cleanup
        if: always()
        run: |
          docker compose -f infra/docker-compose.test.yml --env-file .env.test down -v

  pytest:
    name: Run backend pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python -m pip install pip-audit

      - name: Run tests
        env:
          DEMO_MODE: "false"
          DATABASE_URL: "sqlite+aiosqlite:///./ci_pytest.db"
          SECRET_KEY: "ci_pytest_secret"
        run: |
          pytest
        working-directory: backend

      - name: Dependency audit (python)
        run: |
          pip-audit -r backend/requirements.txt

