# Сканирование секретов — Gitleaks
# Проверяет каждый push и PR на утечку паролей, ключей, токенов

name: Secret Scan

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

jobs:
  gitleaks:
    name: Gitleaks scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Полная история для сканирования всех коммитов

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
