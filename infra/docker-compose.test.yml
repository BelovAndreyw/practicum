# Docker Compose — TEST-окружение
# Использование: docker compose -f infra/docker-compose.test.yml --env-file .env.test up -d
# Изолировано от dev: отдельная сеть, отдельные volumes
# Открыт только Nginx (80/443), остальное — внутренняя сеть

services:
  # ─── Инфраструктура ────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: tz-test-postgres
    env_file: ../.env.test
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Порты НЕ открыты наружу — только внутренняя сеть
    volumes:
      - pgdata-test:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - teamzachet-test

  # ─── Приложение (stub — заменить при выборе стека) ─────────

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: tz-test-backend
    env_file: ../.env.test
    environment:
      BACKEND_DEBUG: "false"
    # Порты НЕ открыты наружу
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - teamzachet-test

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: tz-test-frontend
    # Порты НЕ открыты наружу
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - teamzachet-test

  # ─── Reverse Proxy (единственная точка входа) ──────────────

  nginx:
    image: nginx:1.25-alpine
    container_name: tz-test-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.test.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl/certs:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - teamzachet-test

volumes:
  pgdata-test:

networks:
  teamzachet-test:
    driver: bridge
