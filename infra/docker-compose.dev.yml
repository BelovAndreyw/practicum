# Docker Compose — DEV-окружение
# Использование: docker compose -f infra/docker-compose.dev.yml --env-file .env up -d
# Все порты открыты для отладки, volumes для hot-reload

services:
  # ─── Инфраструктура ────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: tz-dev-postgres
    env_file: ../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - teamzachet-dev

  redis:
    image: redis:7-alpine
    container_name: tz-dev-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - teamzachet-dev

  # ─── Приложение (stub — заменить при выборе стека) ─────────

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: tz-dev-backend
    env_file: ../.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - teamzachet-dev

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: tz-dev-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - teamzachet-dev

  # ─── Reverse Proxy ────────────────────────────────────────

  nginx:
    image: nginx:1.25-alpine
    container_name: tz-dev-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - teamzachet-dev

volumes:
  pgdata-dev:
  redis-dev:

networks:
  teamzachet-dev:
    driver: bridge
